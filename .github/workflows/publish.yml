name: Publish to npm

on:
  push:
    tags:
      - "v*"

# Cancel any in-flight publish for the same ref (re-pushed tags etc.)
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history isn't needed for npm publish, but provenance attestation
          # benefits from the commit being resolvable. Shallow is fine.
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Setup Node (for npm publish + provenance + OIDC)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to latest (trusted-publisher OIDC support)
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag:     v$TAG_VERSION"
          echo "package: v$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        # Authentication uses npm's Trusted Publisher OIDC flow — no NPM_TOKEN
        # required. The repo must be configured as a Trusted Publisher for
        # @cfbender/cesium in npm's package settings before this step succeeds.
        # See README "Releasing" for the one-time bootstrap.
        run: npm publish --access public --provenance
