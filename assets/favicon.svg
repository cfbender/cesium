  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="9.25" ry="9.25"
        fill="none" stroke="#C75B7A" stroke-width="1.5"/>

  <!-- Atomic number, top-left -->
  <text x="8" y="18" fill="#C75B7A"
